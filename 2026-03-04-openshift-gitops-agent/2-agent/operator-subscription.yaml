---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-gitops-operator
spec:
  config:
    env:
      # Ensure the "argocd" namespace we use in this walkthrough
      # for the principal is cluster scoped. This is required.
      - name: ARGOCD_CLUSTER_CONFIG_NAMESPACES
        value: argocd, openshift-gitops
      # Avoid installing default "openshift-gitops" instance on agent cluster
      - name: DISABLE_DEFAULT_ARGOCD_INSTANCE
        value: "true"
      - name: DISABLE_DEFAULT_ARGOCD_CONSOLELINK
        value: "true"
  channel: gitops-1.19
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
